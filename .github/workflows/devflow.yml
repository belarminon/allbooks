name: DevFlow CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  api:
    name: 🧩 API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install API
        working-directory: api-books
        run: npm ci

      - name: Test API
        working-directory: api-books
        run: npm test

  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: api   # só roda se API passar

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Frontend
        working-directory: frontend-books
        run: npm ci

      - name: Build Frontend
        working-directory: frontend-books
        run: npm run build