version: '3.8'

services:
  api:
    build: ./api-books
    ports:
      - "3000:3000"
    volumes:
      - ./api-books:/app
    command: npm run dev

  frontend:
    build: ./frontend-books
    ports:
      - "3001:3000"
    volumes:
      - ./frontend-books:/app
    command: npm start
    environment:
      - REACT_APP_API_URL=http://localhost:3000